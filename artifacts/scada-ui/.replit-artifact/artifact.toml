kind = "web"
previewPath = "/"
title = "CAT_FEEDER_SYS_01 SCADA"
version = "1.0.0"
id = "artifacts/scada-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18668
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/scada-ui run dev"

[services.env]
PORT = "18668"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/scada-ui", "run", "build"]
publicDir = "artifacts/scada-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
