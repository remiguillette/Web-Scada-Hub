kind = "web"
previewPath = "/"
title = "CAT_FEEDER_SYS_01 SCADA Dashboard"
version = "1.0.0"
id = "scada-ui-artifact"

[[services]]
localPort = 18668
name = "web"
paths = ["/"]
serve = "static"

[services.development]
run = "PORT=18668 pnpm --filter @workspace/scada-ui run dev"

[services.production]
build = "pnpm --filter @workspace/scada-ui run build"
