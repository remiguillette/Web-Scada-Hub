kind = "web"
previewPath = "/"
title = "CAT_FEEDER_SYS_01 SCADA Dashboard"
version = "1.0.0"
id = "artifacts/scada-ui-new"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23508

[services.development]
run = "pnpm --filter @workspace/scada-ui-new run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/scada-ui-new", "run", "build" ]
publicDir = "artifacts/scada-ui-new/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23508"
BASE_PATH = "/"
